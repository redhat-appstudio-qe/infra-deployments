---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-maintenance
  namespace: etcd-maintenance
spec:
  schedule: "*/10 * * * *"
  successfulJobsHistoryLimit: 50
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: etcd-maintenance
          restartPolicy: OnFailure
          containers:
            - name: etcd-maintenance
              image: registry.redhat.io/openshift4/ose-cli
              imagePullPolicy: IfNotPresent
              env:
              - name: IMAGE
                value: quay.io/konflux-ci/etcd-defrag@sha256:825638235a85f80f9161b03bfe24666d57d8521ec154a673617ea7b08b07d379
              # currently disabling the defrag parameters because the current version of etcd-defrag is not using them,
              # to allow the built-in defrag to kick in.
              # - name: FRAGMENTATION_THRESHOLD
              #   value: "30"
              # - name: DISK_USAGE_THRESHOLD
              #   value: "60"
              # - name: RECLAIM_SPACE_THRESHOLD
              #   value: "1024"
              command:
                - /bin/sh
                - -c
              # previously passed thresholds as env vars to the debug pod, but defrag.sh
              # uses its own built-in defaults (maxFragmentedPercentage=50, minDefragMB=120).
              # fragmentationThreshold="${FRAGMENTATION_THRESHOLD}"
              # diskUsageThreshold="${DISK_USAGE_THRESHOLD}"
              # reclaimSpaceThreshold="${RECLAIM_SPACE_THRESHOLD}"
                - |
                  etcd_pod=$(oc get pod -l app=etcd -oname -n openshift-etcd | awk -F"/" 'NR==1{ print $2 }')
                  oc -n openshift-etcd debug pod/${etcd_pod} \
                    --image="${IMAGE}" \
                    --one-container=true \
                    -- /bin/sh -c "chmod +x /opt/defrag.sh && /opt/defrag.sh"
