---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets-operator
spec:
  generators:
    - merge:
        mergeKeys:
          - nameNormalized
        generators:
          - clusters:
              values:
                sourceRoot: components/external-secrets-operator
                environment: staging
                clusterDir: ""
              # Exclude stone-stage-p01 from OLM deployment
              # It will use Helm deployment instead
              selector:
                matchExpressions:
                  - key: name
                    operator: NotIn
                    values:
                      - stone-stage-p01
          - list:
              elements: []
  template:
    metadata:
      name: external-secrets-operator-{{nameNormalized}}
    spec:
      project: default
      source:
        path: '{{values.sourceRoot}}/{{values.environment}}/{{values.clusterDir}}'
        repoURL: https://github.com/redhat-appstudio/infra-deployments.git
        targetRevision: main
      destination:
        namespace: external-secrets-operator
        server: '{{server}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 50
          backoff:
            duration: 15s
