apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: authentication-rd
spec:
  generators:
    - merge:
        mergeKeys:
          - nameNormalized
        generators:
          - clusters:
              values:
                sourceRoot: components/authentication-rd
                ring: "ring-0"
                clusterDir: base
          - list:
              elements: # Clusters that this application is not deployed to; this points to any empty Kustomize file
                - nameNormalized: kflux-fedora-01
                  values.clusterDir: kflux-fedora-01
                - nameNormalized: kflux-stg-es01
                  values.clusterDir: kflux-stg-es01
                - nameNormalized: kflux-prd-es01
                  values.clusterDir: kflux-prd-es01

  template:
    metadata:
      name: authentication-rd-{{nameNormalized}}
    spec:
      project: default
      source:
        path: '{{values.sourceRoot}}/rings/{{values.ring}}/{{values.clusterDir}}'
        repoURL: https://github.com/redhat-appstudio/infra-deployments.git
        targetRevision: main
      destination:
        namespace: authentication-rd
        server: '{{server}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        retry:
          limit: 50
          backoff:
            duration: 15s
