apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tempo
spec:
  generators:
  - merge:
      mergeKeys:
        - nameNormalized
      generators:
        - clusters:
            values:
              sourceRoot: components/tracing/tempo
              environment: development
              clusterDir: ""
        - list:
            elements: []
  template:
    metadata:
      name: tempo-{{nameNormalized}}
    spec:
      project: default
      source:
        path: '{{values.sourceRoot}}/{{values.environment}}/{{values.clusterDir}}'
        repoURL: https://github.com/raks-tt/infra-deployments.git
        targetRevision: grafana-tempo-operator
      destination:
        namespace: tempo-operator
        server: '{{server}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 50
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
