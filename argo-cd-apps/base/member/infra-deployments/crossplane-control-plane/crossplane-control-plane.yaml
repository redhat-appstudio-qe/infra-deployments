apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crossplane-control-plane
  labels:
    noSourceTransform: "true"
spec:
  generators:
    - merge:
        mergeKeys:
          - nameNormalized
        generators:
          - clusters:
              values:
                sourceRoot: components/crossplane-control-plane
                environment: development
                clusterDir: ""
          - list:
              elements: []
  template:
    metadata:
      name: crossplane-control-plane-{{nameNormalized}}
    spec:
      project: default
      source:
        chart: crossplane
        repoURL: https://charts.crossplane.io/stable
        targetRevision: 1.18.0
        helm:
          parameters:
            - name: securityContext.runAsUser
              value: "1001100011"
            - name: securityContext.runAsGroup
              value: "1001100011"
            - name: securityContext.fsGroup
              value: "1001102000"
            - name: securityContext.allowPrivilegeEscalation
              value: "false"
      destination:
        namespace: crossplane-system
        server: '{{server}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: -1
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
