apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k8s-groups
spec:
  generators:
    - merge:
        mergeKeys:
          - nameNormalized
        generators:
          - clusters:
              values:
                sourceRoot: components/k8s-groups
                environment: staging
                # This app must have cluster specific configurations.
                # empty-base is an empty overlay. This allows gradual
                # deployment of the application to all the clusters.
                clusterDir: empty-base
          - list:
              elements:
                - nameNormalized: stone-stg-rh01
                  values.clusterDir: stone-stg-rh01
                - nameNormalized: stone-stage-p01
                  values.clusterDir: stone-stage-p01
  template:
    metadata:
      name: k8s-groups-{{nameNormalized}}
    spec:
      project: default
      source:
        path: '{{values.sourceRoot}}/{{values.environment}}/{{values.clusterDir}}'
        repoURL: https://github.com/redhat-appstudio/infra-deployments.git
        targetRevision: main
      destination:
        namespace: k8s-groups
        server: '{{server}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: -1
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
