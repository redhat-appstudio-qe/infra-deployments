apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/ring-deployments

namespace: argocd-infra-deployments
nameSuffix: -ring-4

patches:
  - path: patches/ring-patch.yaml
    target:
      kind: ApplicationSet
      version: v1alpha1
  - path: patches/all-clusters-patch.yaml
    target:
      kind: ApplicationSet
      version: v1alpha1
