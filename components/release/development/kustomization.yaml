apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - ../base/monitor/development
  - https://github.com/konflux-ci/release-service/config/default?ref=842f5673e70dd0194bf7590df3bd0aa4ab6ea02e
  - release_service_config.yaml
images:
  - name: quay.io/konflux-ci/release-service
    newName: quay.io/redhat-user-workloads/rhtap-release-2-tenant/release-service/release-service
    newTag: on-pr-5d8780c6f4ea20872dc6033e97b5fa83d509f302.sealights
namespace: release-service
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: sealights-token-patch.yaml
