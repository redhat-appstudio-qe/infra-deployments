apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - ../base/monitor/development
  - https://github.com/jinqi7/release-service/config/default?ref=c6ba6debb81f2cc25a0a15859587c33af763dc7d
  - release_service_config.yaml
images:
  - name: quay.io/konflux-ci/release-service
    newName: quay.io/redhat-user-workloads/rhtap-release-2-tenant/release-service/release-service
    newTag: on-pr-c6ba6debb81f2cc25a0a15859587c33af763dc7d
namespace: release-service
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: sealights-token-patch.yaml
