apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - ../base/monitor/development
  - https://github.com/jinqi7/release-service/config/default?ref=f3ac83ee0c1ccac2df780eaf6a1e0b36a2a5bbeb
  - release_service_config.yaml
images:
  - name: quay.io/konflux-ci/release-service
    newName: quay.io/redhat-user-workloads/rhtap-release-2-tenant/release-service/release-service
    newTag: on-pr-f3ac83ee0c1ccac2df780eaf6a1e0b36a2a5bbeb
namespace: release-service
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: sealights-token-patch.yaml
