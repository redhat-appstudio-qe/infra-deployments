apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - ../base/monitor/development
  - https://github.com/flacatus/release-service/config/default?ref=9fdbea5eea8d365c4ee3a437ac82298258f019b3
  - release_service_config.yaml
images:
  - name: quay.io/konflux-ci/release-service
    newName: quay.io/redhat-user-workloads/rhtap-release-2-tenant/release-service/release-service
    newTag: on-pr-9fdbea5eea8d365c4ee3a437ac82298258f019b3
namespace: release-service
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: sealights-token-patch.yaml
