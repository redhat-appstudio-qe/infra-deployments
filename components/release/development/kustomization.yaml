apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - ../base/monitor/development
  - https://github.com/johnbieren/release-service/config/default?ref=19165ee077fa630a1009dcedd8ab5ad36ddbcbb8
  - release_service_config.yaml
images:
  - name: quay.io/konflux-ci/release-service
    newName: registry.build09.ci.openshift.org/ci-op-3819i9kv/pipeline
    newTag: redhat-appstudio-release-service-image
namespace: release-service
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: sealights-token-patch.yaml
