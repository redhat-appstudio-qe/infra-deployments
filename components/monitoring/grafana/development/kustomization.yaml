apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/redhat-appstudio/o11y/config/exporters/monitoring/grafana/base?ref=dc3e1fca8f5be8de7e07ae11a0e42c1ff5eb4a01

images:
- name: quay.io/redhat-appstudio/o11y
  newName: quay.io/redhat-appstudio/o11y
  newTag: dc3e1fca8f5be8de7e07ae11a0e42c1ff5eb4a01

patches:
  - path: auto-assign-role-patch.yaml
    target:
      name: grafana-oauth
      kind: Grafana
  - path: grafana-dev-resources-patch.yaml
    target:
      name: grafana-oauth
      kind: Grafana
  - path: grafana-operator-dev-resources-patch.yaml
    target:
      name: grafana-operator
      kind: Subscription
      group: operators.coreos.com
      version: v1alpha1
  # Add a 'version' to avoid using the docker image
  - patch: |
      apiVersion: grafana.integreatly.org/v1beta1
      kind: Grafana
      metadata:
        name: grafana-oauth
        namespace: appstudio-grafana
      spec:
        version: quay.io/kubearchive/grafana:12.1.0
