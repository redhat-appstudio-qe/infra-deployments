apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - dashboards
  - https://github.com/redhat-appstudio/o11y/config/exporters/monitoring/grafana/base?ref=902c16a0781aa6b4c4872a2d246de648cd3c96a0
  - disable-leader-elect-job.yaml

images:
- name: quay.io/redhat-appstudio/o11y
  newName: quay.io/redhat-appstudio/o11y
  newTag: 902c16a0781aa6b4c4872a2d246de648cd3c96a0

patches:
  - path: grafana-resources-patch.yaml
    target:
      name: grafana-oauth
      kind: Grafana
  - path: auto-assign-role-patch.yaml
    target:
      name: grafana-oauth
      kind: Grafana
  - path: grafana-operator-subscription-patch.yaml
    target:
      name: grafana-operator
      kind: Subscription
  # Set resyncPeriod on ALL GrafanaDashboard resources
  # Reduces reconciliation frequency (default 10m → 30m)
  - target:
      kind: GrafanaDashboard
    patch: |-
      - op: add
        path: /spec/resyncPeriod
        value: "30m"
