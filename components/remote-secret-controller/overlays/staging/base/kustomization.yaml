apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base
  - https://github.com/konflux-ci/remote-secret/config/overlays/openshift_aws?ref=da68fe6159f0186878d8bbe69e0bb0813a2f67d5
  - https://github.com/konflux-ci/remote-secret/config/monitoring/prometheus?ref=da68fe6159f0186878d8bbe69e0bb0813a2f67d5
  - aws-credentials-external-secret.yaml

namespace: remotesecret

images:
  - name:  quay.io/redhat-appstudio/remote-secret-controller
    newName: quay.io/redhat-appstudio/remote-secret-controller
    newTag: da68fe6159f0186878d8bbe69e0bb0813a2f67d5

patches:
  - target:
      kind: Deployment
      name: remote-secret-controller-manager
    path: operator-limits-patch.json
