---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  labels:
    app: postgresql
spec:
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: bitnami/postgresql:16.4.0
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              value: kubearchive
            - name: POSTGRESQL_USERNAME
              value: kubearchive
            - name: POSTGRESQL_PASSWORD
              value: password  # notsecret
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  labels:
    app: postgresql
spec:
  type: ClusterIP
  ports:
    - port: 5432
  selector:
    app: postgresql
