apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../base
- postgresql.yaml

namespace: kubearchive

secretGenerator:
- behavior: merge
  literals:
  - POSTGRES_DB=kubearchive
  - POSTGRES_USER=kubearchive
  - POSTGRES_URL=postgresql.kubearchive.svc.cluster.local
  - POSTGRES_PASSWORD=password
  name: kubearchive-database-credentials
  type: Opaque

# These patches add an annotation so an OpenShift service
# creates the TLS secrets instead of Cert Manager
patches:
- path: api-tls-patch.yaml
  target:
    kind: Service
    name: kubearchive-api-server
    namespace: kubearchive
- path: operator-tls-patch.yaml
  target:
    kind: Service
    name: kubearchive-operator-webhooks
    namespace: kubearchive

# We need this to remove the dependency with Cert-Manager,
# as its not installed on development
patchesStrategicMerge:
- delete-resources.yaml
