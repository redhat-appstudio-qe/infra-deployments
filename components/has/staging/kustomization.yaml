apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - ../base/external-secrets
  - rbac
  - https://github.com/redhat-appstudio/application-service/config/prometheus/?ref=4fb62b13ec3fa519e5154c94b0f040fc3458bcdd


configMapGenerator:
  - literals:
      - GITHUB_ORG="redhat-appstudio-appdata-staging"
    name: github-config
    behavior: replace
  - literals:
      - ENVIRONMENT="staging"
    name: feature-flag-config
    behavior: replace

namespace: application-service
