---
# simplified Loki configuration for development
deploymentMode: Distributed

# Service Account configuration to match SCC  
serviceAccount:
  create: false
  name: vector-kubearchive-log-collector-loki

# Basic Loki configuration
loki:
  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki  # This directory will be writable via volume mount
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
     chunk_encoding: snappy
  querier:
     # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
     max_concurrent: 4
  pattern_ingester:
     enabled: false
  limits_config:
       retention_period: 744h  # 31 days retention
       ingestion_rate_mb: 10
       ingestion_burst_size_mb: 20
       max_streams_per_user: 0
       max_line_size: 256000
       reject_old_samples: true
       reject_old_samples_max_age: 168h
       discover_service_name: []
       allow_structured_metadata: true
       volume_enabled: true
       max_global_streams_per_user: 50000

# Security contexts for OpenShift
podSecurityContext:
  runAsNonRoot: false
  allowPrivilegeEscalation: false

containerSecurityContext:
  runAsNonRoot: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true  # Keep read-only root filesystem for security

# Disable test pods
test:
  enabled: false

# Disable sidecar completely to avoid loki-sc-rules container
sidecar:
  rules:
    enabled: false
  datasources:
    enabled: false

singleBinary:
  replicas: 0

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Distributed components configuration
ingester:
  replicas: 3
  autoscaling:
    enabled: true
  zoneAwareReplication:
    enabled: false
  persistence:
    enabled: true
    size: 10Gi
  affinity: {}
  podAntiAffinity:
    soft: {}
    hard: {}

querier:
  replicas: 1
  autoscaling:
    enabled: false
  affinity: {}

queryFrontend:
  replicas: 1

queryScheduler:
  replicas: 1

distributor:
  replicas: 3
  autoscaling:
    enabled: true
  affinity: {}

compactor:
  replicas: 1

indexGateway:
  replicas: 1
  maxUnavailable: 0
  affinity: {}

ruler:
  replicas: 1

bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0

 # This exposes the Loki gateway so it can be written to and queried externaly

gateway:
  enabled: true
  replicas: 1
  image:
    registry: docker.io
    repository: nginxinc/nginx-unprivileged
    tag: 1.24-alpine
  service:
    type: ClusterIP
    port: 80

# Enable minio for storage
minio:
  enabled: true
  rootUser: loki
  rootPassword: supersecret
  mode: standalone
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: 512Mi
  postJob:
    enabled: false