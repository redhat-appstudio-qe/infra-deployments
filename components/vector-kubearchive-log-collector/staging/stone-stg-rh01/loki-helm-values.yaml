---
# simplified Loki configuration for staging
deploymentMode: Distributed

 # This exposes the Loki gateway so it can be written to and queried externaly
gateway:
   service:
     type: LoadBalancer

# Service Account configuration to use IAM role for S3 access
serviceAccount:
  create: false
  name: loki-sa

# Disable canary
lokiCanary:
  enabled: false

# Single binary configuration with proper volume mounts
singleBinary:
  replicas: 0

# Basic Loki configuration with S3 storage
loki:
  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki  # This directory will be writable via volume mount
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  # Configure ingestion limits to handle Vector's data volume
  limits_config:
      retention_period: 744h  # 31 days retention
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      max_streams_per_user: 0
      max_line_size: 256000
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      discover_service_name: []
      allow_structured_metadata: true
      volume_enabled: true
      max_global_streams_per_user: 50000
  # Required storage configuration for Helm chart
  storage:
    type: s3
    bucketNames:
      chunks: stone-stg-rh01-loki-storage
      ruler: stone-stg-rh01-loki-storage
      admin: stone-stg-rh01-loki-storage
    s3:
      endpoint: https://s3.us-east-1.amazonaws.com
      region: us-east-1
  # Required storage_config for Helm chart (chunks on S3)
  storage_config:
    aws:
      s3: s3://stone-stg-rh01-loki-storage
      s3forcepathstyle: true
      bucketnames: stone-stg-rh01-loki-storage
      region: us-east-1
  # Configure ruler storage to use local filesystem
  ruler:
    rule_path: /var/loki/ruler
    storage:
      type: local
      local:
        directory: /var/loki/ruler
  # Configure compactor to use writable volume for working directory
  compactor:
    working_directory: /var/loki/compactor

# Security contexts for OpenShift
podSecurityContext:
  runAsNonRoot: false
  allowPrivilegeEscalation: false

containerSecurityContext:
  runAsNonRoot: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true  # Keep read-only root filesystem for security

# Disable test pods
test:
  enabled: false

# Disable sidecar completely to avoid loki-sc-rules container
sidecar:
  rules:
    enabled: false
  datasources:
    enabled: false

# Disable ALL memcached components to avoid exporter containers and PDB issues
chunksCache:
  enabled: false
  replicas: 0

resultsCache:
  enabled: false
  replicas: 0

memcached:
  enabled: false

memcachedResults:
  enabled: false

memcachedChunks:
  enabled: false

memcachedFrontend:
  enabled: false

memcachedIndexQueries:
  enabled: false

memcachedIndexWrites:
  enabled: false

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Distributed components configuration
ingester:
  replicas: 1
  autoscaling:
    enabled: false
  zoneAwareReplication:
    enabled: false
  persistence:
    enabled: true
    size: 10Gi
  affinity: {}
  podAntiAffinity:
    soft: {}
    hard: {}

querier:
  replicas: 1
  autoscaling:
    enabled: false
  affinity: {}

queryFrontend:
  replicas: 1

queryScheduler:
  replicas: 1

distributor:
  replicas: 1
  autoscaling:
    enabled: false
  affinity: {}

compactor:
  replicas: 1

indexGateway:
  replicas: 1
  maxUnavailable: 0
  affinity: {}

ruler:
  replicas: 1

bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0
