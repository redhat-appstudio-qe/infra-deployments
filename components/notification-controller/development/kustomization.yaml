apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- https://github.com/konflux-ci/notification-service/config/default?ref=b5bd938e714bcc2d5024aa7831f2179eabda2473

images:
  - name: quay.io/konflux-ci/notification-service
    newName: quay.io/konflux-ci/notification-service
    newTag: b5bd938e714bcc2d5024aa7831f2179eabda2473

namespace: notification-controller

patches:
  - path: topic_region_add.yaml
    target:
      name: notification-controller-controller-manager
      kind: Deployment
  - path: pipelinerun_filters.yaml
    target:
      name: notification-controller-controller-manager
      kind: Deployment
