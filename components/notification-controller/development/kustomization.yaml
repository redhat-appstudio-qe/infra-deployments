apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- https://github.com/konflux-ci/notification-service/config/default?ref=10813d1e94354422e8e19d6b4616297e1dc71255

images:
  - name: quay.io/konflux-ci/notification-service
    newName: quay.io/konflux-ci/notification-service
    newTag: 10813d1e94354422e8e19d6b4616297e1dc71255

namespace: notification-controller

patches:
  - path: topic_region_add.yaml
    target:
      name: notification-controller-controller-manager
      kind: Deployment
  - path: pipelinerun_filters.yaml
    target:
      name: notification-controller-controller-manager
      kind: Deployment
