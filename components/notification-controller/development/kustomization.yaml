apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- https://github.com/konflux-ci/notification-service/config/default?ref=80915bd9671665c78c567651b98df8384271825a

images:
  - name: quay.io/konflux-ci/notification-service
    newName: quay.io/konflux-ci/notification-service
    newTag: 80915bd9671665c78c567651b98df8384271825a

namespace: notification-controller

patches:
  - path: topic_region_add.yaml
    target:
      name: notification-controller-controller-manager
      kind: Deployment
  - path: pipelinerun_filters.yaml
    target:
      name: notification-controller-controller-manager
      kind: Deployment
