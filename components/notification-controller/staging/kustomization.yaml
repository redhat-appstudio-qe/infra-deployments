apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- https://github.com/konflux-ci/notification-service/config/default?ref=99960a26f0c8d64a3860dd9a4c6b8b02b6c65c62
- ../base/external-secrets

images:
  - name: quay.io/konflux-ci/notification-service
    newName: quay.io/konflux-ci/notification-service
    newTag: 99960a26f0c8d64a3860dd9a4c6b8b02b6c65c62

namespace: notification-controller

patches:
  - path: external-secret-path.yaml
    target:
      name: aws-sns-secret
      kind: ExternalSecret
      group: external-secrets.io
      version: v1beta1      
  - path: topic_region_add.yaml
    target:
      name: notification-controller-controller-manager
      kind: Deployment
