- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/build-service/config/default?ref=b9bea5fb1de30d6c34b5f39a16d20fbd58bd91ae

namespace: build-service

images:
- name: quay.io/konflux-ci/build-service
