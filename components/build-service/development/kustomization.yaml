apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/tnevrlka/build-service/config/default?ref=bddf2bd558d255d3bf913fcaf3d810f9978c9472
namespace: build-service
images:
  - name: quay.io/konflux-ci/build-service
    newName: registry.build09.ci.openshift.org/ci-op-j6v52vg5/pipeline
    newTag: redhat-appstudio-build-service-image
commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: build-service-controller-manager
    path: image-expiration-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: build-service-controller-manager
    path: pac-webhook-insecure-ssl-patch.yaml
components:
  - ../components/rh-certs
