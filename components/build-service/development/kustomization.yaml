apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/build-service/config/default?ref=beee6ee00ab8b8c5d31185bd4c853657ab573541
namespace: build-service
images:
  - name: quay.io/konflux-ci/build-service
    newName: quay.io/redhat-user-workloads/rhtap-build-tenant/build-service/build-service
    newTag: f16bd8cb176c57a5168670ace7b3017d918d79cf.sealights
commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: build-service-controller-manager
    path: image-expiration-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: build-service-controller-manager
    path: pac-webhook-insecure-ssl-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: build-service-controller-manager
    path: sealights-token-patch.yaml
components:
  - ../components/rh-certs
