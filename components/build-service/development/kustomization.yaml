apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/build-service/config/default?ref=79c8a5dd15a84294d1b16a705c2bffc1d4c16e1a
namespace: build-service
images:
  - name: quay.io/konflux-ci/build-service
    newName: quay.io/redhat-user-workloads/rhtap-build-tenant/build-service/build-service
    newTag: 3087d89e119fed73130275081b4d58e6235ae0db.sealights
commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: build-service-controller-manager
    path: image-expiration-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: build-service-controller-manager
    path: pac-webhook-insecure-ssl-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: build-service-controller-manager
    path: sealights-token-patch.yaml
components:
  - ../components/rh-certs
