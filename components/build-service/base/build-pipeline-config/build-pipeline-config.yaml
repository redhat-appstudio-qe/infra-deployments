apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:5c6cef49bdd9dfcfb5d1328c1c35cb16b3dc53b4
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:5c6cef49bdd9dfcfb5d1328c1c35cb16b3dc53b4
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:5c6cef49bdd9dfcfb5d1328c1c35cb16b3dc53b4
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:5c6cef49bdd9dfcfb5d1328c1c35cb16b3dc53b4
      additional-params:
      - build-platforms
