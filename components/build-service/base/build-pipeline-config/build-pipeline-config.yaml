    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:86e02fac444312bad50aa46fac38e933bd98559f
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:86e02fac444312bad50aa46fac38e933bd98559f
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:86e02fac444312bad50aa46fac38e933bd98559f
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:86e02fac444312bad50aa46fac38e933bd98559f
      additional-params:
      - build-platforms
