    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:e95aec6a94bf6dcf532cd75de9a6b8b4e7f79fb1
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:e95aec6a94bf6dcf532cd75de9a6b8b4e7f79fb1
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:e95aec6a94bf6dcf532cd75de9a6b8b4e7f79fb1
