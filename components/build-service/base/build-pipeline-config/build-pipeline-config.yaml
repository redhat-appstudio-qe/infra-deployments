apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:13b425e91a5a10bd19dbc3e82cb3f921b6a8e5d8
      additional-params:
      - build-platforms
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:13b425e91a5a10bd19dbc3e82cb3f921b6a8e5d8
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:13b425e91a5a10bd19dbc3e82cb3f921b6a8e5d8
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:13b425e91a5a10bd19dbc3e82cb3f921b6a8e5d8
      additional-params:
      - build-platforms
    - name: maven-zip-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build:13b425e91a5a10bd19dbc3e82cb3f921b6a8e5d8
    - name: maven-zip-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build-oci-ta:13b425e91a5a10bd19dbc3e82cb3f921b6a8e5d8
    - name: tekton-bundle-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-tekton-bundle-builder:13b425e91a5a10bd19dbc3e82cb3f921b6a8e5d8
