apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:5a8e618dc2656f2a52bfd352bc4a9fe1fb19c87e
      additional-params:
      - build-platforms
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:5a8e618dc2656f2a52bfd352bc4a9fe1fb19c87e
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:5a8e618dc2656f2a52bfd352bc4a9fe1fb19c87e
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:5a8e618dc2656f2a52bfd352bc4a9fe1fb19c87e
      additional-params:
      - build-platforms
    - name: maven-zip-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build:5a8e618dc2656f2a52bfd352bc4a9fe1fb19c87e
    - name: maven-zip-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build-oci-ta:5a8e618dc2656f2a52bfd352bc4a9fe1fb19c87e
    - name: tekton-bundle-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-tekton-bundle-builder:5a8e618dc2656f2a52bfd352bc4a9fe1fb19c87e
