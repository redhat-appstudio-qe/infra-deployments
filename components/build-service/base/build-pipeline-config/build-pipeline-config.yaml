apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:5d7eb70cebe9600b6c3ddbc12e2813d4eb843e92
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:5d7eb70cebe9600b6c3ddbc12e2813d4eb843e92
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:5d7eb70cebe9600b6c3ddbc12e2813d4eb843e92
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:5d7eb70cebe9600b6c3ddbc12e2813d4eb843e92
      additional-params:
      - build-platforms
