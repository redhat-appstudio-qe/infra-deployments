apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:c45ee5fcdb8bf98a4e5e42d52c16f68f757fc6ed
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:c45ee5fcdb8bf98a4e5e42d52c16f68f757fc6ed
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:c45ee5fcdb8bf98a4e5e42d52c16f68f757fc6ed
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:c45ee5fcdb8bf98a4e5e42d52c16f68f757fc6ed
      additional-params:
      - build-platforms
