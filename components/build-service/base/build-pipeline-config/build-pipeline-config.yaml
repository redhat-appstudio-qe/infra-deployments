apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:7dfec4ab8c77f88d08d6e433aced9c6fe60fb8b9
      additional-params:
      - build-platforms
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:7dfec4ab8c77f88d08d6e433aced9c6fe60fb8b9
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:7dfec4ab8c77f88d08d6e433aced9c6fe60fb8b9
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:7dfec4ab8c77f88d08d6e433aced9c6fe60fb8b9
      additional-params:
      - build-platforms
