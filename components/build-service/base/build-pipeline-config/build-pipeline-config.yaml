apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:50e5fa3c9b8dec8b81bf75ade3d85be0adbeb7f1
      additional-params:
      - build-platforms
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:50e5fa3c9b8dec8b81bf75ade3d85be0adbeb7f1
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:50e5fa3c9b8dec8b81bf75ade3d85be0adbeb7f1
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:50e5fa3c9b8dec8b81bf75ade3d85be0adbeb7f1
      additional-params:
      - build-platforms
    - name: maven-zip-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build:50e5fa3c9b8dec8b81bf75ade3d85be0adbeb7f1
    - name: maven-zip-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build-oci-ta:50e5fa3c9b8dec8b81bf75ade3d85be0adbeb7f1
    - name: tekton-bundle-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-tekton-bundle-builder:50e5fa3c9b8dec8b81bf75ade3d85be0adbeb7f1
