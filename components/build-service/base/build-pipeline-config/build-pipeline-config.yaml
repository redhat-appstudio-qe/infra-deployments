apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:7fbc6e8eaa72c87d19aa1e5ca5bb3ca15b31c294
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:7fbc6e8eaa72c87d19aa1e5ca5bb3ca15b31c294
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:7fbc6e8eaa72c87d19aa1e5ca5bb3ca15b31c294
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:7fbc6e8eaa72c87d19aa1e5ca5bb3ca15b31c294
      additional-params:
      - build-platforms
