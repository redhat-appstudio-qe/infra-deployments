      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:16d4619e70116ed6b3f2d1443c5ced9bf2d7afe0
      additional-params:
      - build-platforms
    - name: maven-zip-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build:16d4619e70116ed6b3f2d1443c5ced9bf2d7afe0
    - name: maven-zip-build-oci-ta
