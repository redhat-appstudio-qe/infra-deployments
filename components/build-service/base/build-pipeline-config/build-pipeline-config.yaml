apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:fa3b0d9ad717a8a7d1b0bc46dfb4a95f84d5b895
      additional-params:
      - build-platforms
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:fa3b0d9ad717a8a7d1b0bc46dfb4a95f84d5b895
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:fa3b0d9ad717a8a7d1b0bc46dfb4a95f84d5b895
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:fa3b0d9ad717a8a7d1b0bc46dfb4a95f84d5b895
      additional-params:
      - build-platforms
    - name: maven-zip-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build:fa3b0d9ad717a8a7d1b0bc46dfb4a95f84d5b895
    - name: maven-zip-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build-oci-ta:fa3b0d9ad717a8a7d1b0bc46dfb4a95f84d5b895
    - name: tekton-bundle-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-tekton-bundle-builder:fa3b0d9ad717a8a7d1b0bc46dfb4a95f84d5b895
