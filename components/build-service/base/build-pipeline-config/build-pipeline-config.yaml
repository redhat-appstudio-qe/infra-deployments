apiVersion: v1
kind: ConfigMap
metadata:
  name: build-pipeline-config
  namespace: build-service
data:
  config.yaml: |
    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:bd7ad231f53df70c2d3bf68cb5aeb5f4b36cb22a
      additional-params:
      - build-platforms
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:bd7ad231f53df70c2d3bf68cb5aeb5f4b36cb22a
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:bd7ad231f53df70c2d3bf68cb5aeb5f4b36cb22a
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:bd7ad231f53df70c2d3bf68cb5aeb5f4b36cb22a
      additional-params:
      - build-platforms
    - name: maven-zip-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build:bd7ad231f53df70c2d3bf68cb5aeb5f4b36cb22a
    - name: maven-zip-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build-oci-ta:bd7ad231f53df70c2d3bf68cb5aeb5f4b36cb22a
    - name: tekton-bundle-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-tekton-bundle-builder:bd7ad231f53df70c2d3bf68cb5aeb5f4b36cb22a
    - name: tekton-bundle-builder-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-tekton-bundle-builder-oci-ta:bd7ad231f53df70c2d3bf68cb5aeb5f4b36cb22a
