apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=13294bb8e1869d566e987f17326ed566b3216f60
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=13294bb8e1869d566e987f17326ed566b3216f60
images:
  - name: quay.io/redhat-appstudio/integration-service
    newName: registry.build09.ci.openshift.org/ci-op-yy7sp1zc/pipeline
    newTag: redhat-appstudio-integration-service-image
configMapGenerator:
  - name: console-url
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="3h"
      - TASKS_TIMEOUT="2h"
      - FINALLY_TIMEOUT="1h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
