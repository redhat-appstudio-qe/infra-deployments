apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=e42b9229f0ef03a06ac6e8b2fe22a6c95528bc0c
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=e42b9229f0ef03a06ac6e8b2fe22a6c95528bc0c
images:
  - name: quay.io/redhat-appstudio/integration-service
    newName: registry.build05.ci.openshift.org/ci-op-2rx9wrzf/pipeline
    newTag: redhat-appstudio-integration-service-image
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="3h"
      - TASKS_TIMEOUT="2h"
      - FINALLY_TIMEOUT="1h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
