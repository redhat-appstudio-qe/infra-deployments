apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=d36f1e8b5bbb502f6e472e5f683f577fd626664e
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=d36f1e8b5bbb502f6e472e5f683f577fd626664e
images:
  - name: quay.io/konflux-ci/integration-service
    newName: quay.io/redhat-user-workloads/konflux-qe-team-tenant/integration-service
    newTag: on-pr-d36f1e8b5bbb502f6e472e5f683f577fd626664e
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
      - INTEGRATION_NS="integration-service"
      - PAC_SECRET="pipelines-as-code-secret"
      - GITHUBAPPLICATION_ID="github-application-id"
      - GITHUBPRIVATE_KEY="github-private-key"
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="6h"
      - TASKS_TIMEOUT="4h"
      - FINALLY_TIMEOUT="2h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: integration-service-controller-manager
    path: sealights-token-patch.yaml
components:
  - ../rh-certs
