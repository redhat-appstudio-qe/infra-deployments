apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=b6b194ababd76e34e74d2811e2edfd59b3f22754
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=b6b194ababd76e34e74d2811e2edfd59b3f22754
images:
  - name: quay.io/redhat-appstudio/integration-service
    newName: registry.build04.ci.openshift.org/ci-op-gr5kv8gn/pipeline
    newTag: redhat-appstudio-integration-service-image
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="3h"
      - TASKS_TIMEOUT="2h"
      - FINALLY_TIMEOUT="1h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
