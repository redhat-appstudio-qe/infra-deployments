apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=942f5ea99ed19a1b948d1b36b33db5482e3ca313
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=942f5ea99ed19a1b948d1b36b33db5482e3ca313
images:
  - name: quay.io/konflux-ci/integration-service
    newName: quay.io/redhat-user-workloads/rhtap-integration-tenant/integration-service/integration-service
    newTag: on-pr-942f5ea99ed19a1b948d1b36b33db5482e3ca313
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="6h"
      - TASKS_TIMEOUT="4h"
      - FINALLY_TIMEOUT="2h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: integration-service-controller-manager
    path: sealights-token-patch.yaml
components:
  - ../rh-certs
