apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=97f7de195740e3da0771009d75ee34c9fb38e7ba
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=97f7de195740e3da0771009d75ee34c9fb38e7ba
images:
  - name: quay.io/redhat-appstudio/integration-service
    newName: registry.build02.ci.openshift.org/ci-op-sj2bnj2x/pipeline
    newTag: redhat-appstudio-integration-service-image
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="6h"
      - TASKS_TIMEOUT="4h"
      - FINALLY_TIMEOUT="2h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
