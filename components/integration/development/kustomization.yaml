apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=02afdc4d53a57c70722bf38be4faa72410509cba
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=02afdc4d53a57c70722bf38be4faa72410509cba
images:
  - name: quay.io/redhat-appstudio/integration-service
    newName: registry.build03.ci.openshift.org/ci-op-6v04xyqk/pipeline
    newTag: redhat-appstudio-integration-service-image
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="6h"
      - TASKS_TIMEOUT="4h"
      - FINALLY_TIMEOUT="2h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
