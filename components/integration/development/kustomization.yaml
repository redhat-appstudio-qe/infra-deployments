apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=7d74e71a1e9d728d3b22432ed2bf1420e5f9540e
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=7d74e71a1e9d728d3b22432ed2bf1420e5f9540e
images:
  - name: quay.io/konflux-ci/integration-service
    newName: quay.io/redhat-user-workloads/rhtap-integration-tenant/integration-service/integration-service
    newTag: on-pr-7d74e71a1e9d728d3b22432ed2bf1420e5f9540e
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
      - INTEGRATION_NS="integration-service"
      - PAC_SECRET="pipelines-as-code-secret"
      - GITHUBAPPLICATION_ID="github-application-id"
      - GITHUBPRIVATE_KEY="github-private-key"
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="6h"
      - TASKS_TIMEOUT="4h"
      - FINALLY_TIMEOUT="2h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: integration-service-controller-manager
    path: sealights-token-patch.yaml
components:
  - ../rh-certs
