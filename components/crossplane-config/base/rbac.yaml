---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crossplane-sa
  namespace: crossplane-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-clusterrole
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - "*"

---
# Allow the crossplane-clusterrole SA in the clusters namespace to manage clusters
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crossplane-rb
  namespace: crossplane-system
subjects:
- kind: ServiceAccount
  name: crossplane-sa
  namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: crossplane-clusterrole
  apiGroup: rbac.authorization.k8s.io
