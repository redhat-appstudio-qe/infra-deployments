apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/flacatus/image-controller/config/default?ref=e86559a6a884917b18bce88a4fa831b77d6eca3f
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build09.ci.openshift.org/ci-op-t5vxbr54/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
