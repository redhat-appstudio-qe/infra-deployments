apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/rcerven/image-controller/config/default?ref=2464d43e8a4381213b419a0ee742ede9b57e35ba
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build05.ci.openshift.org/ci-op-wc0mgdzb/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
