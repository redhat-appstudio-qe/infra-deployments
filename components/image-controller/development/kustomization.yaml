apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/mavaras/image-controller/config/default?ref=4d4256cb203628bdc9f5f31c5f46bae4c46766dd
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build03.ci.openshift.org/ci-op-z36i1psd/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
