apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/tkdchen/image-controller/config/default?ref=52a4c2533285840cd411783d3ed0bd7a5ec122ef
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build09.ci.openshift.org/ci-op-6lbv3f28/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
