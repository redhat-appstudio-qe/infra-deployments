apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/rcerven/image-controller/config/default?ref=855e1d4c4dbfc1132083f5c35bbb5e6a5ec65c7d
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build05.ci.openshift.org/ci-op-m2tq7g63/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
