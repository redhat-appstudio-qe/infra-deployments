apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/rcerven/image-controller/config/default?ref=80065b8a56a3ee1c9dcd66e9eca9552f80293187
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build10.ci.openshift.org/ci-op-hcp29wx3/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
