apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/image-controller/config/default?ref=5d504f293cf9267b88c5129bfca5da7d003dfdc4
images:
  - name: quay.io/konflux-ci/image-controller
    newName: quay.io/redhat-user-workloads/rhtap-build-tenant/image-controller/image-controller
    newTag: b54f99a76900c9e89f4a6c7713b581f4b7afda27.sealights
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: sealights-token-patch.yaml
