apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/rcerven/image-controller/config/default?ref=b8443f4cdfbee3d515c6326dddb609d41eaa19ce
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build04.ci.openshift.org/ci-op-l7qcfpry/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
