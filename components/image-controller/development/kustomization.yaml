apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/flacatus/image-controller/config/default?ref=d0958a9488ca5fdea31e4ece949491ff704533ba
images:
  - name: quay.io/konflux-ci/image-controller
    newName: quay.io/redhat-user-workloads/rhtap-build-tenant/image-controller/image-controller
    newTag: on-pr-d0958a9488ca5fdea31e4ece949491ff704533ba
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: sealights-token-patch.yaml
