apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/mavaras/image-controller/config/default?ref=1d7a4c0881b2391eb92ecc78c3214394aaf680bd
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build04.ci.openshift.org/ci-op-si80j0vj/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
