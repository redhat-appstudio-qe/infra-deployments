apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/image-controller/config/default?ref=c87a3e8ea98effca0d3a84138ab667381f0cd3a4
images:
  - name: quay.io/konflux-ci/image-controller
    newName: quay.io/redhat-user-workloads/rhtap-build-tenant/image-controller/image-controller
    newTag: on-pr-c87a3e8ea98effca0d3a84138ab667381f0cd3a4
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
