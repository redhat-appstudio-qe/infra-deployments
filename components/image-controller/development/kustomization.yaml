apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/mshaposhnik/image-controller/config/default?ref=2c5486ed20351b95e69078a068d5c20d983058e7
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build09.ci.openshift.org/ci-op-n4hhsnnw/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
