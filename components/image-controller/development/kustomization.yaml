apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/rcerven/image-controller/config/default?ref=6fd237ade5a3a45f3dc29a11f12edd79d7d74805
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build03.ci.openshift.org/ci-op-dli4v10y/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
