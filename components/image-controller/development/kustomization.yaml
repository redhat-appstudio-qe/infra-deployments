apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/flacatus/image-controller/config/default?ref=9c486b1cbf7e3d29036f60ecf23e18f6a235b5cd
images:
  - name: quay.io/konflux-ci/image-controller
    newName: registry.build09.ci.openshift.org/ci-op-f2pgjtmd/pipeline
    newTag: redhat-appstudio-image-controller-image
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
