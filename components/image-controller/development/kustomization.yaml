apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/mmorhun/image-controller/config/default?ref=57c8fa24c19a60279a008a50b6b7bb4b74a7c5a0
images:
  - name: quay.io/konflux-ci/image-controller
    newName: quay.io/redhat-user-workloads/rhtap-build-tenant/image-controller/image-controller
    newTag: on-pr-57c8fa24c19a60279a008a50b6b7bb4b74a7c5a0
namespace: image-controller
patches:
  - path: ./manager_resources_patch.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: logs-in-console-format-cmd-arg-patch.yaml
