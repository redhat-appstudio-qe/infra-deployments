apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- https://github.com/konflux-ci/mintmaker/config/default?ref=feea07ba90fc44c35fa2e946d42780f6aae5d410
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=feea07ba90fc44c35fa2e946d42780f6aae5d410

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: feea07ba90fc44c35fa2e946d42780f6aae5d410
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: bc2c3e74cd77d5bb0ce6974d24ff9c49c625cad2

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

patches:
  - path: manager_patch.yaml

configurations:
- kustomizeconfig.yaml

components:
  - ../../components/rh-certs
