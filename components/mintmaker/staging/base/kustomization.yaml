  newTag: e7f45bfa699463e079274819edcfdc47f92c398e
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: e4a148cf84b5825908c5b748a9ce07ddb9c98727

commonAnnotations:
