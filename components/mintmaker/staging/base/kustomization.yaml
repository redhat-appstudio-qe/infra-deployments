apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/mintmaker/config/default?ref=5ee3d251d0f5244c71532de98d091ab8bc27810c
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=5ee3d251d0f5244c71532de98d091ab8bc27810c

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: 5ee3d251d0f5244c71532de98d091ab8bc27810c
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: e5a6e37a42c9d6ca64793c6b125e7082879d121c

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

patches:
  - path: manager_patch.yaml

configurations:
- kustomizeconfig.yaml
