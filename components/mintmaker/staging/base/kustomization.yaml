apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/mintmaker/config/default?ref=e7f45bfa699463e079274819edcfdc47f92c398e
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=e7f45bfa699463e079274819edcfdc47f92c398e

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
