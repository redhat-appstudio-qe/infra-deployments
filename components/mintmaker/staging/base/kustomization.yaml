apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- https://github.com/konflux-ci/mintmaker/config/default?ref=a0020d3172b41c92db33bedae24f84a4db4351c2
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=a0020d3172b41c92db33bedae24f84a4db4351c2

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: a0020d3172b41c92db33bedae24f84a4db4351c2
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: b868738bb445897e009bc2f9911729674fc0dd27

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

patches:
  - path: manager_patch.yaml

configurations:
- kustomizeconfig.yaml
