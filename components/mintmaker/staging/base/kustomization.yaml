apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- https://github.com/konflux-ci/mintmaker/config/default?ref=6d79d77d019d27b6ba3874d1c3e60b15dd60ad33
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=6d79d77d019d27b6ba3874d1c3e60b15dd60ad33

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: 6d79d77d019d27b6ba3874d1c3e60b15dd60ad33
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: d34e28347c029686c71f9990770d7c3b63e127eb

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

patches:
  - path: manager_patch.yaml

configurations:
- kustomizeconfig.yaml

components:
  - ../../components/rh-certs
