apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- https://github.com/konflux-ci/mintmaker/config/default?ref=35aae405f973e3ae3c52e2a7f27ecc4f46e4c5c3
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=35aae405f973e3ae3c52e2a7f27ecc4f46e4c5c3

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
