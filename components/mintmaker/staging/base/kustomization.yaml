apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- https://github.com/konflux-ci/mintmaker/config/default?ref=20dc4af723c3e5d69ad2b33f09a0fc68f0b50b6e
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=20dc4af723c3e5d69ad2b33f09a0fc68f0b50b6e

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: 20dc4af723c3e5d69ad2b33f09a0fc68f0b50b6e
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: 4eee94eef226cda80beff759941ac92751abefe3

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

patches:
  - path: manager_patch.yaml

configurations:
- kustomizeconfig.yaml

components:
  - ../../components/rh-certs
