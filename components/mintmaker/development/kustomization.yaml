apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/mintmaker/config/default?ref=9f71e8cd5c0176b89050c78e6a45cc7a8ae9df02
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=9f71e8cd5c0176b89050c78e6a45cc7a8ae9df02

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: 9f71e8cd5c0176b89050c78e6a45cc7a8ae9df02
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
