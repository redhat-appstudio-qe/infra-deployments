apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/mintmaker/config/default?ref=434a8d2e14c9e6f07f5f800eacc0299ba6ee73c7
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=434a8d2e14c9e6f07f5f800eacc0299ba6ee73c7

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: 434a8d2e14c9e6f07f5f800eacc0299ba6ee73c7
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
