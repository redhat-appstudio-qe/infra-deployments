apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/mintmaker/config/default?ref=6efc4812a1e2556fa5cf1a1a12f240cd11a0dcc0
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=6efc4812a1e2556fa5cf1a1a12f240cd11a0dcc0

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: 6efc4812a1e2556fa5cf1a1a12f240cd11a0dcc0
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
