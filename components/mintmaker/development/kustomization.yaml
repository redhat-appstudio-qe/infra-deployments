  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=8587b6df5fe2aa47ac41fc47ba8be316ffb13732

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: 8587b6df5fe2aa47ac41fc47ba8be316ffb13732
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
