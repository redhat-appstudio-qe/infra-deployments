apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/mintmaker/config/default?ref=6ef6371900a853d4e8d6b88e0f31bb7a8cdd59a1
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=6ef6371900a853d4e8d6b88e0f31bb7a8cdd59a1

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: 6ef6371900a853d4e8d6b88e0f31bb7a8cdd59a1
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
