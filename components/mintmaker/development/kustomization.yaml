  - https://github.com/konflux-ci/mintmaker/config/default?ref=bb9759585e5682d8a4c474c2e9a7af33b26532be
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=bb9759585e5682d8a4c474c2e9a7af33b26532be

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
