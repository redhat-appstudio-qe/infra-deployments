apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/mintmaker/config/default?ref=6fbde4d9d6fa5d4823ea34ef2af0c257d4e19386
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=6fbde4d9d6fa5d4823ea34ef2af0c257d4e19386

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: 6fbde4d9d6fa5d4823ea34ef2af0c257d4e19386
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
