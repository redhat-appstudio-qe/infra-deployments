apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - plrs-resource-quota.yaml
  - https://github.com/konflux-ci/mintmaker/config/default?ref=63373ea48cdd1277bbb6df9211c4850c44a0cbf3
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=63373ea48cdd1277bbb6df9211c4850c44a0cbf3

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: 63373ea48cdd1277bbb6df9211c4850c44a0cbf3
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
