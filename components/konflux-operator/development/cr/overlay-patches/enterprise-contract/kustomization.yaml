apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ecp.yaml
patches:
  - path: enterprise-contract.yaml
  - target:
      kind: EnterpriseContractPolicy
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/sync-wave: "10"
