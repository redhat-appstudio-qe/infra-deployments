- https://github.com/redhat-appstudio/managed-gitops/manifests/overlays/appstudio-staging-cluster?ref=5e2b25a79b0ec6f242161c5a159e6fad8e85a16f
- ../openshift-gitops/overlays/production-and-dev

images:
  - name: \${COMMON_IMAGE}
    newName: quay.io/redhat-appstudio/gitops-service
    newTag: 5e2b25a79b0ec6f242161c5a159e6fad8e85a16f

patches:
  - path: core_service_resources_patch.yaml
  - path: service_agent_resources_patch.yaml
  - path: gitops-service-argocd.yaml
